# nginx.conf — Nginx 리버스 프록시 설정 예시
# /etc/nginx/sites-available/ip-logger 에 복사 후 심볼릭 링크 생성

upstream ip_logger {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name yourdomain.com;

    # HTTPS 강제 리다이렉트 (Let's Encrypt 등 적용 후 활성화)
    # return 301 https://$host$request_uri;

    # 실제 IP를 Flask로 전달
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header Host            $host;
    proxy_redirect   off;

    # /admin 접근 제한 (선택: IP 화이트리스트)
    location /admin {
        # allow 203.0.113.0/24;   # 허용할 IP 대역
        # deny  all;
        proxy_pass http://ip_logger;
    }

    location / {
        proxy_pass         http://ip_logger;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # 헬스체크는 인증 없이 통과
    location /health {
        proxy_pass http://ip_logger;
        access_log off;
    }

    # 로그 설정
    access_log /var/log/nginx/ip-logger-access.log;
    error_log  /var/log/nginx/ip-logger-error.log;
}

